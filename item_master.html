<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Master</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .btn { padding: 10px 15px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background-color: #f9f9f9; }
        .btn:hover { background-color: #e9e9e9; }
        .btn-primary { background-color: #4CAF50; color: white; border: none; }
        .btn-primary:hover { background-color: #45a049; }

        /* Modal styles */
        .modal {
            display: none; position: fixed; z-index: 10; left: 0; top: 0;
            width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.4);
        }
        .modal-content {
            background-color: #fefefe; margin: 5% auto; padding: 20px;
            border: 1px solid #888; width: 50%; border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close:hover { color: black; }

        /* Form styles */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .form-row { display: flex; gap: 15px; }
        .form-row .form-group { flex: 1; }

        /* Item Card styles */
        .item-card {
            border: 1px solid #ddd; border-radius: 5px; padding: 15px;
            margin-bottom: 15px; display: flex; gap: 20px; background-color: #fafafa;
        }
        .item-card img { width: 150px; height: 150px; border-radius: 4px; object-fit: contain; border: 1px solid #ccc; background-color: #fff; }
        .item-details h3 { margin-top: 0; color: #333; }
        .item-details p { margin: 5px 0; color: #555; }
        .price-highlight { font-size: 1.1em; color: #2e7d32; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Item Master</h1>
    <button id="addItemBtn" class="btn btn-primary" type="button">Add item</button>

    <div id="itemsList" style="margin-top: 30px;">
        <!-- Items will be rendered here dynamically -->
    </div>

    <!-- Add Item Modal -->
    <div id="itemModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Add New Item</h2>
            <form id="itemForm">
                <div class="form-group">
                    <label for="itemName">Item Name *</label>
                    <input type="text" id="itemName" required>
                </div>
                <div class="form-group">
                    <label for="itemDesc">Item Description</label>
                    <textarea id="itemDesc" rows="3"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="itemHSN">HSN</label>
                        <input type="text" id="itemHSN">
                    </div>
                    <div class="form-group">
                        <label for="itemQty">Available Quantity</label>
                        <input type="number" id="itemQty" min="0">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="listPrice">List Price</label>
                        <input type="number" id="listPrice" min="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label for="discount">Discount (%)</label>
                        <input type="number" id="discount" min="0" max="100" step="0.01">
                    </div>
                    <div class="form-group">
                        <label for="sellingPrice">Selling Price</label>
                        <input type="number" id="sellingPrice" readonly style="background-color: #e0e0e0;">
                    </div>
                </div>

                <div class="form-group">
                    <label for="itemImage">Item Image</label>
                    <input type="file" id="itemImage" accept="image/*">
                    <img id="imagePreview" style="max-width: 150px; max-height: 150px; display: none; margin-top: 10px; border: 1px solid #ccc;" />
                </div>

                <div class="form-group" style="text-align: right; margin-top: 20px;">
                    <button type="button" id="cancelBtn" class="btn">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="margin-left: 10px;">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // DOM Elements
        const modal = document.getElementById('itemModal');
        const addItemBtn = document.getElementById('addItemBtn');
        const closeBtn = document.getElementsByClassName('close')[0];
        const cancelBtn = document.getElementById('cancelBtn');
        const itemForm = document.getElementById('itemForm');
        const itemsList = document.getElementById('itemsList');

        const listPriceInput = document.getElementById('listPrice');
        const discountInput = document.getElementById('discount');
        const sellingPriceInput = document.getElementById('sellingPrice');
        const itemImageInput = document.getElementById('itemImage');
        const imagePreview = document.getElementById('imagePreview');

        let currentImageBase64 = '';

        // 1. Initialize items from LocalStorage so data persists across refreshes
        let items = JSON.parse(localStorage.getItem('itemMasterData')) || [];

        // 2. Calculate Selling Price = List Price - (List Price * Discount / 100)
        function calculateSellingPrice() {
            const listPrice = parseFloat(listPriceInput.value) || 0;
            const discount = parseFloat(discountInput.value) || 0;
            const sellingPrice = listPrice - (listPrice * (discount / 100));
            sellingPriceInput.value = sellingPrice > 0 ? sellingPrice.toFixed(2) : 0;
        }

        listPriceInput.addEventListener('input', calculateSellingPrice);
        discountInput.addEventListener('input', calculateSellingPrice);

        // 3. Handle Image Preview and Base64 Conversion
        itemImageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    currentImageBase64 = event.target.result;
                    imagePreview.src = currentImageBase64;
                    imagePreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            } else {
                currentImageBase64 = '';
                imagePreview.style.display = 'none';
                imagePreview.src = '';
            }
        });

        // 4. Modal Open/Close Logic
        addItemBtn.onclick = (e) => {
            e.preventDefault();
            modal.style.display = 'block';
        };
        closeBtn.onclick = () => modal.style.display = 'none';
        cancelBtn.onclick = () => modal.style.display = 'none';
        window.onclick = (e) => { if (e.target == modal) modal.style.display = 'none'; };

        // 5. Handle Form Submission (Save Item)
        itemForm.addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent page refresh

            const newItem = {
                id: Date.now(), // unique ID
                name: document.getElementById('itemName').value,
                description: document.getElementById('itemDesc').value,
                hsn: document.getElementById('itemHSN').value,
                quantity: document.getElementById('itemQty').value,
                listPrice: document.getElementById('listPrice').value,
                discount: document.getElementById('discount').value,
                sellingPrice: document.getElementById('sellingPrice').value,
                image: currentImageBase64
            };

            // Add to array and save to local storage
            items.push(newItem);
            localStorage.setItem('itemMasterData', JSON.stringify(items));

            // Re-render the list
            renderItems();

            // Reset form and close modal
            itemForm.reset();
            currentImageBase64 = '';
            imagePreview.style.display = 'none';
            modal.style.display = 'none';
        });

        // 6. Render Items to the Screen
        function renderItems() {
            itemsList.innerHTML = ''; // Clear current list

            if (items.length === 0) {
                itemsList.innerHTML = '<p style="color: #666;">No items available. Click "Add item" to create one.</p>';
                return;
            }

            // Loop through items in reverse to show newest first
            [...items].reverse().forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';

                const imgHtml = item.image
                    ? `<img src="${item.image}" alt="${item.name}">`
                    : `<div style="width: 150px; height: 150px; background: #eee; display: flex; align-items: center; justify-content: center; border: 1px solid #ccc; border-radius: 4px; color: #888;">No Image</div>`;

                card.innerHTML = `
                    ${imgHtml}
                    <div class="item-details">
                        <h3>${item.name}</h3>
                        <p><strong>Description:</strong> ${item.description || 'N/A'}</p>
                        <p><strong>HSN:</strong> ${item.hsn || 'N/A'} &nbsp;|&nbsp; <strong>Available Qty:</strong> ${item.quantity || '0'}</p>
                        <p><strong>List Price:</strong> ₹${item.listPrice || '0'} &nbsp;|&nbsp; <strong>Discount:</strong> ${item.discount || '0'}%</p>
                        <p class="price-highlight">Selling Price: ₹${item.sellingPrice || '0'}</p>
                    </div>
                `;
                itemsList.appendChild(card);
            });
        }

        // Run render function on initial load
        renderItems();
    </script>
</body>
</html>
